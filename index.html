<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SueldoPro 2026 | Calculadora Laboral Líder en Perú</title>
    <meta name="description" content="Calcula tu sueldo neto, gratificación y CTS con la UIT 2026. La herramienta más precisa para trabajadores en Perú.">
    <meta name="keywords" content="sueldo neto peru, calculadora laboral, gratificacion 2026, cts, sunat, uit 2026">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        brand: { 500: '#0066ff', 600: '#0052cc', 900: '#001a33' },
                        dark: { 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-active { border-bottom: 3px solid #0066ff; color: #0066ff; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800 px-6 py-4 no-print">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-brand-500 text-white p-2 rounded-xl font-black">SP</div>
                <h1 class="text-xl font-black tracking-tighter">SUELDO<span class="text-brand-500">PRO</span> <span class="text-[10px] bg-brand-500/10 px-2 py-0.5 rounded text-brand-500 ml-1 uppercase">2026</span></h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2 rounded-xl bg-slate-100 dark:bg-dark-900">🌓</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="flex gap-8 mb-8 border-b border-slate-200 dark:border-slate-800 overflow-x-auto no-print">
            <button onclick="setMode('sueldo')" id="tab-sueldo" class="tab-active pb-4 font-bold whitespace-nowrap">Sueldo Mensual</button>
            <button onclick="setMode('grati')" id="tab-grati" class="pb-4 font-bold text-slate-400 whitespace-nowrap">Gratificación</button>
            <button onclick="setMode('cts')" id="tab-cts" class="pb-4 font-bold text-slate-400 whitespace-nowrap">C.T.S.</button>
        </div>

        <div class="grid lg:grid-cols-12 gap-10">
            <div class="lg:col-span-7 space-y-6 no-print">
                <div class="bg-white dark:bg-dark-900 p-8 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-800">
                    <h2 id="calc-title" class="text-2xl font-black mb-6">Calculadora de Sueldo Neto</h2>
                    
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label id="label-v1" class="text-xs font-black uppercase text-slate-400">Sueldo Bruto (S/)</label>
                            <input type="number" id="v1" oninput="calculate()" value="2500" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none focus:ring-2 focus:ring-brand-500 font-bold">
                        </div>
                        <div id="box-v2" class="space-y-2">
                            <label class="text-xs font-black uppercase text-slate-400">Asignación Familiar</label>
                            <select id="v2" onchange="calculate()" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none font-bold">
                                <option value="0">Sin hijos (S/ 0)</option>
                                <option value="113">Con hijos (S/ 113.00)</option>
                            </select>
                        </div>
                        <div id="box-v3" class="space-y-2">
                            <label class="text-xs font-black uppercase text-slate-400">Sistema de Pensión</label>
                            <select id="v3" onchange="calculate()" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none font-bold">
                                <option value="0.13">ONP (13%)</option>
                                <option value="0.117">AFP Integra/Prima (Prom.)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-blue-600 p-6 rounded-3xl text-white">
                        <p class="text-xs font-bold opacity-80 uppercase">UIT Vigente 2026</p>
                        <h4 class="text-2xl font-black">S/ 5,500.00</h4>
                    </div>
                    <div class="bg-white dark:bg-dark-900 p-6 rounded-3xl border border-slate-200 dark:border-slate-800">
                        <p class="text-xs font-bold text-slate-400 uppercase">Sueldo Mínimo Vital</p>
                        <h4 class="text-2xl font-black text-brand-500">S/ 1,130.00</h4>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div id="printable-boleta" class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl border-t-8 border-brand-500 sticky top-28">
                    <div class="flex justify-between mb-8">
                        <h3 class="text-xl font-black uppercase tracking-tighter">Resumen de Cálculo</h3>
                        <span class="text-[10px] font-bold text-brand-500 bg-brand-500/10 px-2 py-1 rounded">OFICIAL 2026</span>
                    </div>

                    <div class="space-y-4">
                        <div class="flex justify-between text-sm"><span>Total Ingresos</span><span id="res-ingresos" class="font-bold">S/ 0.00</span></div>
                        <div class="flex justify-between text-sm text-red-500"><span>Total Descuentos</span><span id="res-descuentos" class="font-bold">- S/ 0.00</span></div>
                        <div class="pt-4 border-t border-slate-100 dark:border-slate-800 text-center">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Neto Estimado</p>
                            <h2 id="res-neto" class="text-5xl font-black text-brand-500 my-2">S/ 0.00</h2>
                        </div>
                        <button onclick="window.print()" class="no-print w-full mt-4 bg-dark-950 dark:bg-brand-500 text-white font-bold py-4 rounded-2xl hover:opacity-90 transition-all flex items-center justify-center gap-2">
                            🖨️ Imprimir / Guardar PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentMode = 'sueldo';

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        function setMode(mode) {
            currentMode = mode;
            // Actualizar Tabs
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('tab-active', 'text-brand-500'));
            document.getElementById('tab-' + mode).classList.add('tab-active');
            
            // Actualizar UI Inputs
            const title = document.getElementById('calc-title');
            const labelV1 = document.getElementById('label-v1');
            const boxV2 = document.getElementById('box-v2');
            const boxV3 = document.getElementById('box-v3');

            if(mode === 'sueldo') {
                title.innerText = "Calculadora de Sueldo Neto";
                labelV1.innerText = "Sueldo Bruto (S/)";
                boxV2.classList.remove('hidden');
                boxV3.classList.remove('hidden');
            } else if(mode === 'grati') {
                title.innerText = "Calculadora de Gratificación";
                labelV1.innerText = "Sueldo Mensual (S/)";
                boxV2.classList.add('hidden');
                boxV3.classList.add('hidden');
            } else if(mode === 'cts') {
                title.innerText = "Cálculo de C.T.S.";
                labelV1.innerText = "Sueldo + 1/6 Grati (S/)";
                boxV2.classList.add('hidden');
                boxV3.classList.add('hidden');
            }
            calculate();
        }

        function calculate() {
            const v1 = parseFloat(document.getElementById('v1').value) || 0;
            const v2 = parseFloat(document.getElementById('v2').value) || 0;
            const v3 = parseFloat(document.getElementById('v3').value) || 0;

            let ingresos = 0, descuentos = 0, neto = 0;

            if(currentMode === 'sueldo') {
                ingresos = v1 + v2;
                descuentos = ingresos * v3;
                // Quinta Categoría simple
                const anual = ingresos * 14;
                if(anual > (5500 * 7)) {
                    descuentos += ((anual - (5500 * 7)) * 0.08) / 12;
                }
                neto = ingresos - descuentos;
            } else if(currentMode === 'grati') {
                ingresos = v1; 
                const bono = ingresos * 0.09;
                neto = ingresos + bono;
                descuentos = 0; // La grati no tiene descuentos de pensión
            } else if(currentMode === 'cts') {
                ingresos = v1;
                neto = ingresos / 2; // Semestral
                descuentos = 0;
            }

            document.getElementById('res-ingresos').innerText = 'S/ ' + ingresos.toFixed(2);
            document.getElementById('res-descuentos').innerText = '- S/ ' + descuentos.toFixed(2);
            document.getElementById('res-neto').innerText = 'S/ ' + neto.toLocaleString('en-US', {minimumFractionDigits:2});
        }

        // Init
        calculate();
    </script>
</body>
</html>
