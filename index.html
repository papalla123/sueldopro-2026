<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro Elite 2026 | El Estándar Laboral en Perú</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        brand: { 500: '#0066ff', 600: '#0052cc', 900: '#001a33' },
                        dark: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .nav-tab.active { background: #0066ff; color: white; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,102,255,0.2); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.05); }
        .dark .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.05); }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-950 text-slate-900 dark:text-slate-100 min-h-screen">

    <header class="sticky top-0 z-50 glass-card no-print">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand-500 text-white w-10 h-10 rounded-xl flex items-center justify-center font-black shadow-lg shadow-brand-500/30">SP</div>
                <h1 class="text-2xl font-black tracking-tighter uppercase">Sueldo<span class="text-brand-500">Pro</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleTheme()" class="p-2.5 rounded-2xl bg-slate-100 dark:bg-dark-800 transition-all hover:scale-110">🌓</button>
            </div>
        </div>
        <div class="max-w-7xl mx-auto px-6 py-2 flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="openSection('calc')" id="t-calc" class="nav-tab active px-6 py-2.5 rounded-xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-wider">🧮 Calculadoras</button>
            <button onclick="openSection('jobs')" id="t-jobs" class="nav-tab px-6 py-2.5 rounded-xl text-xs font-bold text-slate-500 whitespace-nowrap transition-all uppercase tracking-wider">👨‍💻 Mercado Laboral</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">

        <section id="sec-calc" class="tool-section animate-slideUp">
            <div class="grid lg:grid-cols-12 gap-10">
                <div class="lg:col-span-3 space-y-3 no-print">
                    <button onclick="setCalc('neto')" class="c-btn active w-full text-left p-5 rounded-3xl border-2 border-transparent bg-white dark:bg-dark-900 shadow-sm hover:border-brand-500 transition-all">
                        <p class="text-[10px] font-black text-brand-500 uppercase mb-1">Paso 01</p>
                        <h4 class="font-bold">Sueldo Neto</h4>
                    </button>
                    <button onclick="setCalc('grati')" class="c-btn w-full text-left p-5 rounded-3xl border-2 border-transparent bg-white dark:bg-dark-900 shadow-sm hover:border-brand-500 transition-all">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Paso 02</p>
                        <h4 class="font-bold">Gratificación</h4>
                    </button>
                    <button onclick="setCalc('cts')" class="c-btn w-full text-left p-5 rounded-3xl border-2 border-transparent bg-white dark:bg-dark-900 shadow-sm hover:border-brand-500 transition-all">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Paso 03</p>
                        <h4 class="font-bold">C.T.S.</h4>
                    </button>
                    <button onclick="setCalc('liq')" class="c-btn w-full text-left p-5 rounded-3xl border-2 border-transparent bg-white dark:bg-dark-900 shadow-sm hover:border-brand-500 transition-all">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Paso 04</p>
                        <h4 class="font-bold">Liquidación</h4>
                    </button>
                </div>

                <div class="lg:col-span-5 bg-white dark:bg-dark-900 p-8 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-800">
                    <div id="calc-form">
                        </div>
                </div>

                <div class="lg:col-span-4">
                    <div id="boleta-final" class="bg-white dark:bg-dark-900 p-8 rounded-[2.5rem] shadow-2xl border-t-[12px] border-brand-500 sticky top-32">
                        <div class="flex justify-between items-start mb-6">
                            <h3 class="font-black text-xl uppercase tracking-tighter">Resumen Pro</h3>
                            <span class="text-[10px] font-bold bg-brand-500/10 text-brand-500 px-2 py-1 rounded">2026 V.ELITE</span>
                        </div>
                        <div id="boleta-content" class="space-y-4">
                            </div>
                        <button onclick="window.print()" class="no-print w-full mt-8 bg-brand-900 text-white font-bold py-4 rounded-2xl hover:bg-black transition-all">🖨️ Descargar Boleta PDF</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-jobs" class="tool-section hidden">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
                <h2 class="text-4xl font-black tracking-tight">Explorar <span class="text-brand-500">Oficios</span></h2>
                <div class="relative w-full md:w-96">
                    <input type="text" id="job-search" onkeyup="searchJobs()" placeholder="Ej. Ingeniero, Chef, Minero..." class="w-full p-5 rounded-2xl bg-white dark:bg-dark-900 border border-slate-200 dark:border-slate-800 outline-none focus:ring-2 focus:ring-brand-500 font-medium">
                    <span class="absolute right-5 top-5 opacity-30">🔍</span>
                </div>
            </div>
            <div id="jobs-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </section>

    </main>

    <script>
        // BASE DE DATOS MASIVA DE OFICIOS 2026
        const allJobs = [
            { n: "Ingeniero de Software", s: "S/ 5,500 - 15,000", i: "💻", c: "Tecnología" },
            { n: "Médico Especialista", s: "S/ 7,000 - 18,000", i: "🩺", c: "Salud" },
            { n: "Arquitecto Cloud", s: "S/ 9,000 - 20,000", i: "☁️", c: "Tecnología" },
            { n: "Chef de Cocina", s: "S/ 3,500 - 8,000", i: "🍳", c: "Gastronomía" },
            { n: "Contador Auditor", s: "S/ 4,000 - 9,500", i: "📊", c: "Finanzas" },
            { n: "Minero de Socavón", s: "S/ 4,500 - 10,000", i: "⛏️", c: "Minería" },
            { n: "Psicólogo Clínico", s: "S/ 3,000 - 6,500", i: "🧠", c: "Salud" },
            { n: "Diseñador UX/UI", s: "S/ 4,000 - 9,000", i: "🎨", c: "Creativo" },
            { n: "Electricista Industrial", s: "S/ 2,800 - 5,500", i: "⚡", c: "Técnico" },
            { n: "Abogado Corporativo", s: "S/ 5,000 - 14,000", i: "⚖️", c: "Legal" },
            { n: "Data Scientist", s: "S/ 6,000 - 16,000", i: "🧪", c: "Tecnología" },
            { n: "Docente Universitario", s: "S/ 4,500 - 11,000", i: "📚", c: "Educación" }
        ];

        let activeCalc = 'neto';

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        function openSection(id) {
            document.querySelectorAll('.tool-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('sec-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('t-' + id).classList.add('active');
        }

        function setCalc(type) {
            activeCalc = type;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('active', 'border-brand-500'));
            event.currentTarget.classList.add('active', 'border-brand-500');
            renderForm();
        }

        function renderForm() {
            const form = document.getElementById('calc-form');
            const titles = { neto: "Sueldo Mensual Neto", grati: "Gratificación Julio/Dic", cts: "C.T.S. Semestral", liq: "Liquidación Total" };
            
            let inputs = `
                <h3 class="text-2xl font-black mb-8 tracking-tight">${titles[activeCalc]}</h3>
                <div class="space-y-6">
                    <div>
                        <label class="text-[11px] font-black uppercase text-slate-400 ml-1 tracking-widest">Sueldo Bruto (S/)</label>
                        <input type="number" id="in-bruto" oninput="run()" value="2500" class="w-full p-4 mt-2 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none focus:ring-2 focus:ring-brand-500 font-bold text-lg transition-all">
                    </div>
            `;

            if(activeCalc === 'neto') {
                inputs += `
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Hijos</label>
                            <select id="in-hijos" onchange="run()" class="w-full p-4 mt-2 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none font-bold">
                                <option value="0">No</option><option value="113">Sí (+S/113)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Sistema</label>
                            <select id="in-afp" onchange="run()" class="w-full p-4 mt-2 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none font-bold">
                                <option value="0.13">ONP (13%)</option><option value="0.117">AFP (11.7%)</option>
                            </select>
                        </div>
                    </div>
                `;
            } else if(activeCalc === 'grati' || activeCalc === 'cts') {
                inputs += `
                    <div>
                        <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Meses Trabajados</label>
                        <input type="number" id="in-meses" oninput="run()" value="6" max="6" class="w-full p-4 mt-2 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none font-bold">
                    </div>
                `;
            } else if(activeCalc === 'liq') {
                inputs += `
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Años</label>
                            <input type="number" id="in-anos" oninput="run()" value="1" class="w-full p-4 mt-2 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none font-bold">
                        </div>
                        <div>
                            <label class="text-[11px] font-black uppercase text-slate-400 ml-1">Meses Adicionales</label>
                            <input type="number" id="in-meses-liq" oninput="run()" value="0" class="w-full p-4 mt-2 rounded-2xl bg-slate-50 dark:bg-dark-950 border-none outline-none font-bold">
                        </div>
                    </div>
                `;
            }

            inputs += `</div>`;
            form.innerHTML = inputs;
            run();
        }

        function run() {
            const bruto = parseFloat(document.getElementById('in-bruto').value) || 0;
            const boleta = document.getElementById('boleta-content');
            let total = 0, d1 = 0, d2 = 0;

            if(activeCalc === 'neto') {
                const hijos = parseFloat(document.getElementById('in-hijos').value);
                const afp = parseFloat(document.getElementById('in-afp').value);
                d1 = (bruto + hijos) * afp;
                total = (bruto + hijos) - d1;
                boleta.innerHTML = `
                    <div class="flex justify-between text-sm"><span>Sueldo Bruto</span><span class="font-bold">S/ ${bruto.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm"><span>Asig. Familiar</span><span class="font-bold">S/ ${hijos.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm text-red-500"><span>Aporte Pensión</span><span class="font-bold">-S/ ${d1.toFixed(2)}</span></div>
                    <div class="pt-6 text-center"><p class="text-xs text-slate-400 font-bold uppercase">Neto a Recibir</p><h2 class="text-4xl font-black text-brand-500">S/ ${total.toLocaleString()}</h2></div>
                `;
            } else if(activeCalc === 'grati') {
                const meses = parseFloat(document.getElementById('in-meses').value) || 0;
                const base = (bruto / 6) * meses;
                const bono = base * 0.09;
                total = base + bono;
                boleta.innerHTML = `
                    <div class="flex justify-between text-sm"><span>Gratificación Bruta</span><span class="font-bold">S/ ${base.toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm text-green-600"><span>Bono Extra (9%)</span><span class="font-bold">+S/ ${bono.toFixed(2)}</span></div>
                    <div class="pt-6 text-center"><p class="text-xs text-slate-400 font-bold uppercase">Total Gratificación</p><h2 class="text-4xl font-black text-brand-500">S/ ${total.toLocaleString()}</h2></div>
                `;
            } else if(activeCalc === 'cts') {
                const meses = parseFloat(document.getElementById('in-meses').value) || 0;
                total = ((bruto + (bruto/6)) / 12) * meses;
                boleta.innerHTML = `
                    <div class="flex justify-between text-sm"><span>Sueldo Computable</span><span class="font-bold">S/ ${(bruto + bruto/6).toFixed(2)}</span></div>
                    <div class="flex justify-between text-sm"><span>Meses acumulados</span><span class="font-bold">${meses}</span></div>
                    <div class="pt-6 text-center"><p class="text-xs text-slate-400 font-bold uppercase">CTS Estimada</p><h2 class="text-4xl font-black text-brand-500">S/ ${total.toLocaleString()}</h2></div>
                `;
            } else if(activeCalc === 'liq') {
                const anos = parseFloat(document.getElementById('in-anos').value) || 0;
                const meses = parseFloat(document.getElementById('in-meses-liq').value) || 0;
                const baseLiq = bruto * anos + (bruto/12) * meses;
                boleta.innerHTML = `
                    <div class="flex justify-between text-sm"><span>Indemnización/Tiempo</span><span class="font-bold">S/ ${baseLiq.toFixed(2)}</span></div>
                    <div class="pt-6 text-center"><p class="text-xs text-slate-400 font-bold uppercase">Liquidación Proyectada</p><h2 class="text-4xl font-black text-brand-500">S/ ${baseLiq.toLocaleString()}</h2></div>
                `;
            }
        }

        function searchJobs() {
            const term = document.getElementById('job-search').value.toLowerCase();
            const filtered = allJobs.filter(j => j.n.toLowerCase().includes(term) || j.c.toLowerCase().includes(term));
            drawJobs(filtered);
        }

        function drawJobs(list) {
            const grid = document.getElementById('jobs-grid');
            grid.innerHTML = list.map(j => `
                <div onclick="setJobSueldo(${parseFloat(j.s.replace(/[^0-9]/g, ''))})" class="glass-card p-6 rounded-[2.5rem] hover:scale-105 transition-all cursor-pointer group shadow-sm hover:shadow-xl">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">${j.i}</div>
                    <p class="text-[10px] font-black text-brand-500 uppercase tracking-widest">${j.c}</p>
                    <h4 class="font-extrabold text-lg mb-2">${j.n}</h4>
                    <p class="text-xs font-bold text-slate-400 uppercase">Rango estimado:</p>
                    <p class="font-black text-brand-600 dark:text-brand-400">${j.s}</p>
                </div>
            `).join('');
        }

        function setJobSueldo(val) {
            openSection('calc');
            document.getElementById('in-bruto').value = val;
            run();
        }

        // Init
        renderForm();
        drawJobs(allJobs);
    </script>
</body>
</html>
