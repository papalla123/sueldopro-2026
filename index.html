<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | Data Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        brand: { 500: '#0066ff', 600: '#0052cc', 900: '#001a33' },
                        dark: { 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s; }
        .sidebar-btn.active { background: #0066ff; color: white; box-shadow: 0 8px 20px -5px rgba(0, 102, 255, 0.4); }
        .sec-content { display: none; }
        .sec-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .data-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0066ff; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-950 text-slate-800 dark:text-slate-200 min-h-screen flex">

    <aside class="w-20 lg:w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-dark-900 fixed h-full z-50 flex flex-col p-4 overflow-y-auto">
        <div class="flex items-center gap-3 px-2 mb-8">
            <div class="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center text-white font-black">SP</div>
            <span class="hidden lg:block text-xl font-black italic tracking-tighter dark:text-white uppercase">Sueldo<span class="text-brand-500">Pro</span></span>
        </div>

        <nav class="flex-1 space-y-1">
            <button onclick="nav('neto')" id="m-neto" class="sidebar-btn active w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">💰 Neto</button>
            <button onclick="nav('costo')" id="m-costo" class="sidebar-btn w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">🏢 Costo Empresa</button>
            <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">🔍 Radar Oficios</button>
            <button onclick="nav('blog')" id="m-blog" class="sidebar-btn w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">📰 Noticias</button>
            <button onclick="nav('forex')" id="m-forex" class="sidebar-btn w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">💱 Divisas</button>
            <div class="pt-4 border-t border-slate-100 dark:border-slate-800 mt-4">
                <button onclick="toggleTheme()" class="w-full flex items-center justify-center gap-2 p-2 rounded-lg bg-slate-100 dark:bg-dark-800 text-[10px] font-bold">🌓 TEMA</button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 ml-20 lg:ml-64 p-6 lg:p-10">

        <section id="sec-forex" class="sec-content">
            <h2 class="text-3xl font-black mb-8 italic">Mercado de <span class="text-brand-500">Divisas</span></h2>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="bg-white dark:bg-dark-900 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-xl">
                    <label class="text-[10px] font-black text-slate-500 uppercase">Monto a Convertir</label>
                    <input type="number" id="f-in" oninput="runForex()" value="100" class="w-full bg-slate-50 dark:bg-dark-950 p-5 rounded-2xl text-2xl font-black mb-4 border-none">
                    <select id="f-sel" onchange="runForex()" class="w-full bg-slate-100 dark:bg-dark-800 p-4 rounded-xl font-bold mb-6 outline-none">
                        <option value="3.85">🇺🇸 Dólar (USD/PEN)</option>
                        <option value="4.15">🇪🇺 Euro (EUR/PEN)</option>
                        <option value="4.82">🇬🇧 Libra (GBP/PEN)</option>
                        <option value="0.025">🇯🇵 Yen (JPY/PEN)</option>
                        <option value="0.53">🇨🇳 Yuan (CNY/PEN)</option>
                    </select>
                    <div class="bg-brand-500/10 p-6 rounded-2xl text-center">
                        <h2 id="f-out" class="text-4xl font-black text-brand-500 italic">S/ 385.00</h2>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white dark:bg-dark-900 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-xl min-h-[350px]">
                    <canvas id="forexChart"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-3xl font-black italic">Radar Salarial <span class="text-brand-500">2026</span></h2>
                <input type="text" id="j-search" onkeyup="runJobs()" placeholder="Filtrar carrera o especialidad..." class="bg-white dark:bg-dark-900 border border-slate-200 dark:border-slate-800 p-4 rounded-2xl outline-none w-full lg:w-96 shadow-sm">
            </div>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </section>

        <section id="sec-blog" class="sec-content">
            <h2 class="text-3xl font-black mb-10 italic">Terminal de <span class="text-brand-500">Noticias Laborales</span></h2>
            <div id="news-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="sec-neto" class="sec-content active">
             <h2 class="text-3xl font-black mb-8 italic">Sueldo <span class="text-brand-500">Neto 2026</span></h2>
             <div class="max-w-xl bg-white dark:bg-dark-900 p-8 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-2xl">
                <input type="number" id="n-bruto" oninput="runNeto()" value="3500" class="w-full bg-slate-50 dark:bg-dark-950 p-6 rounded-2xl text-4xl font-black border-none mb-6">
                <div id="out-neto" class="text-5xl font-black text-brand-500 text-center py-6 border-y border-slate-100 dark:border-slate-800">S/ 0.00</div>
                <button onclick="genPDF()" class="w-full mt-6 py-4 bg-brand-500 text-white font-black rounded-xl">Generar Boleta PDF</button>
             </div>
        </section>

        <section id="sec-costo" class="sec-content">
            <h2 class="text-3xl font-black mb-8 italic">Costo <span class="text-brand-500">Empresa</span></h2>
            <div class="max-w-xl bg-white dark:bg-dark-900 p-10 rounded-[2.5rem] border border-brand-500">
                <input type="number" id="e-bruto" oninput="runCosto()" value="2500" class="w-full bg-slate-50 dark:bg-dark-950 p-6 rounded-2xl text-4xl font-black border-none">
                <div id="out-costo" class="text-5xl font-black text-brand-500 text-center mt-6">S/ 0.00</div>
            </div>
        </section>

    </main>

    <script>
        // DIVISAS DATA (Historial simulado preciso)
        const forexData = {
            "3.85": [3.81, 3.84, 3.82, 3.86, 3.85], // USD
            "4.15": [4.10, 4.12, 4.11, 4.18, 4.15], // EUR
            "4.82": [4.75, 4.78, 4.80, 4.85, 4.82], // GBP
            "0.025": [0.023, 0.024, 0.024, 0.026, 0.025], // JPY
            "0.53": [0.51, 0.52, 0.52, 0.54, 0.53]  // CNY
        };

        const news = [
            {t:"Actualización UIT 2026", s:"MEF", c:"La proyección oficial sitúa la UIT en S/ 5,500 para el ejercicio fiscal 2026, afectando el cálculo de multas e impuestos.", f:"https://www.gob.pe/mef"},
            {t:"Ley de Gratificaciones", s:"El Peruano", c:"Ratifican la inafectación de descuentos en gratificaciones de julio y diciembre para el sector privado.", f:"https://elperuano.pe"},
            {t:"Tope de 4ta Categoría", s:"SUNAT", c:"Se establece el nuevo monto de S/ 3,755 mensuales para no realizar retenciones del 8% en recibos por honorarios.", f:"https://sunat.gob.pe"},
            {t:"Sueldo Mínimo Vital", s:"MTPE", c:"Debate técnico para el ajuste de la RMV según la inflación acumulada del periodo 2025-2026.", f:"https://www.gob.pe/mtpe"},
            {t:"Aportes a ESSALUD", s:"ESSALUD", c:"Nuevas plataformas digitales para que empleadores verifiquen el estado de aportes de sus trabajadores en tiempo real.", f:"https://www.essalud.gob.pe"},
            {t:"Régimen MYPE 2026", s:"Produce", c:"Nuevos beneficios tributarios para empresas que formalicen a más de 5 trabajadores en planilla este año.", f:"https://www.gob.pe/produce"}
        ];

        const jobs = [
            {n:"Ingeniero IA / Machine Learning", min:9000, max:18500, i:"🤖", l:"https://www.ponteencarrera.pe/pec-portal-web/inicio/como-va-el-empleo"},
            {n:"Médico Especialista", min:8500, max:16000, i:"🩺", l:"https://pago.pe"},
            {n:"Arquitecto Cloud Senior", min:10000, max:20000, i:"☁️", l:"https://www.linkedin.com/salary/"},
            {n:"Desarrollador Fullstack", min:5500, max:12000, i:"💻", l:"https://carrera.pe"},
            {n:"Minero de Socavón Sr", min:5000, max:10000, i:"⛏️", l:"https://www.minem.gob.pe"},
            {n:"Chef Ejecutivo", min:4000, max:9000, i:"👨‍🍳", l:"https://www.turismo.pe"}
        ];

        let chart;
        function initChart(rate) {
            const ctx = document.getElementById('forexChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie (Hoy)'],
                    datasets: [{
                        label: 'Tipo de Cambio',
                        data: forexData[rate] || [0,0,0,0,0],
                        borderColor: '#0066ff',
                        backgroundColor: 'rgba(0, 102, 255, 0.1)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false } }, y: { position: 'right' } }
                }
            });
        }

        function runForex() {
            const v = parseFloat(document.getElementById('f-in').value) || 0;
            const r = document.getElementById('f-sel').value;
            document.getElementById('f-out').innerText = 'S/ ' + (v * parseFloat(r)).toLocaleString('en-US',{minimumFractionDigits:2});
            initChart(r);
        }

        function renderJobs(data) {
            document.getElementById('job-grid').innerHTML = data.map(j => `
                <div class="bg-white dark:bg-dark-900 p-8 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 shadow-md">
                    <div class="text-4xl mb-4">${j.i}</div>
                    <h4 class="font-black text-lg">${j.n}</h4>
                    <div class="flex justify-between mt-4 border-t pt-4">
                        <div><p class="text-[9px] text-slate-400">MÍNIMO</p><p class="font-bold text-slate-600 dark:text-slate-300">S/ ${j.min}</p></div>
                        <div class="text-right"><p class="text-[9px] text-brand-500">MAX PROY.</p><p class="text-xl font-black text-brand-500">S/ ${j.max}</p></div>
                    </div>
                    <a href="${j.l}" target="_blank" class="block mt-6 text-center text-[10px] font-black uppercase text-slate-400 hover:text-brand-500 transition-colors">Ver Fuente Oficial →</a>
                </div>
            `).join('');
        }

        function renderNews() {
            document.getElementById('news-grid').innerHTML = news.map(n => `
                <div class="bg-white dark:bg-dark-900 p-6 rounded-[2rem] border-l-4 border-brand-500 shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-brand-500 uppercase tracking-widest">${n.s}</span>
                        <a href="${n.f}" target="_blank" class="text-[10px] text-slate-400 hover:underline">OFICIAL</a>
                    </div>
                    <h4 class="font-bold text-md leading-tight">${n.t}</h4>
                    <p class="text-xs text-slate-500 mt-3 leading-relaxed">${n.c}</p>
                </div>
            `).join('');
        }

        function runNeto() {
            const b = parseFloat(document.getElementById('n-bruto').value) || 0;
            const neto = b - (b * 0.13); // ONP base
            document.getElementById('out-neto').innerText = 'S/ ' + neto.toLocaleString('en-US',{minimumFractionDigits:2});
        }

        function runCosto() {
            const b = parseFloat(document.getElementById('e-bruto').value) || 0;
            const total = b * 1.45; // Aprox Régimen General
            document.getElementById('out-costo').innerText = 'S/ ' + total.toLocaleString('en-US',{minimumFractionDigits:2});
        }

        function nav(id) {
            document.querySelectorAll('.sec-content').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('m-' + id).classList.add('active');
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }

        window.onload = () => {
            renderNews(); 
            renderJobs(jobs); 
            runForex(); 
            runNeto();
            runCosto();
        };
    </script>
</body>
</html>
