<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | Global Market Supremacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-dark-950 flex">
    <aside class="w-20 lg:w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-dark-900 fixed h-full z-50 flex flex-col p-4">
        <div class="mb-10 text-center lg:text-left px-2">
            <h1 class="text-brand-500 font-black text-2xl hidden lg:block italic">SueldoPro<span class="text-slate-400">2026</span></h1>
            <span class="lg:hidden font-black text-brand-500 text-2xl">S/</span>
        </div>
        <nav class="flex-1 space-y-2">
            <button onclick="nav('neto')" id="m-neto" class="sidebar-btn active w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">💰 <span class="hidden lg:inline" data-t="m_neto">Neto</span></button>
            <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">🔍 <span class="hidden lg:inline" data-t="m_radar">Radar</span></button>
            <button onclick="nav('forex')" id="m-forex" class="sidebar-btn w-full flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">📈 <span class="hidden lg:inline">Divisas</span></button>
        </nav>
    </aside>

    <main class="flex-1 ml-20 lg:ml-64 p-6 lg:p-10">
        <section id="sec-neto" class="sec-content active">
            <h2 class="text-4xl font-black mb-8 italic">Calculadora <span class="text-brand-500">Neto</span></h2>
            <div class="bg-white dark:bg-dark-900 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 max-w-2xl">
                <input type="number" id="bruto" placeholder="Sueldo Bruto" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-dark-800 text-2xl font-black mb-4 outline-none border-2 border-transparent focus:border-brand-500 transition-all">
                <button onclick="runNeto()" class="w-full bg-brand-500 hover:bg-blue-600 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-blue-500/30">CALCULAR</button>
            </div>
            <div class="guide-box mt-10 max-w-2xl">
                <h4 id="guide-neto-title" class="font-black text-brand-500 uppercase mb-2"></h4>
                <p id="guide-neto-text" class="text-sm italic opacity-70"></p>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <h2 class="text-4xl font-black mb-8 italic">Radar <span class="text-brand-500">1000 Oficios</span></h2>
            <input type="text" id="job-search" placeholder="Busca entre miles de empleos..." class="w-full p-4 rounded-2xl bg-white dark:bg-dark-900 border border-slate-200 dark:border-slate-800 mb-8 outline-none focus:ring-2 ring-brand-500">
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
