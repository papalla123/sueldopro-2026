<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | Tech Financial Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col lg:flex-row">
    
    <aside class="w-full lg:w-72 border-b lg:border-r border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl p-6 sticky top-0 z-50 flex lg:flex-col">
        <div class="flex-1">
            <h1 class="text-2xl font-black mb-8 text-blue-600 tracking-tighter">SUELDOPRO<span class="text-slate-400">2026</span></h1>
            <nav class="flex lg:flex-col gap-2 overflow-x-auto pb-4 lg:pb-0">
                <button onclick="nav('calcs')" id="m-calcs" class="sidebar-btn active">📊 <span>Calculadoras</span></button>
                <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn">🔍 <span>Radar 1000</span></button>
                <button onclick="nav('forex')" id="m-forex" class="sidebar-btn">📈 <span>Divisas</span></button>
                <button onclick="nav('news')" id="m-news" class="sidebar-btn">📰 <span>Noticias</span></button>
            </nav>
        </div>
        <div class="flex items-center gap-4 mt-auto pt-6 border-t border-slate-200 dark:border-slate-800">
            <button onclick="toggleTheme()" class="p-3 rounded-xl bg-slate-100 dark:bg-slate-800 transition-all hover:scale-110">🌓</button>
            <div class="text-[10px] font-bold opacity-40 uppercase">v2.0 Stable</div>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-12">
        <section id="sec-calcs" class="sec-content active">
            <header class="mb-10">
                <h2 class="text-5xl font-black tracking-tight mb-2">Financial <span class="text-blue-600">Hub</span></h2>
                <p class="opacity-50 font-medium">Selecciona la herramienta que necesitas procesar hoy.</p>
            </header>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-10">
                <button onclick="setCalc('neto')" class="calc-card active" id="btn-neto">💰 Sueldo Neto</button>
                <button onclick="setCalc('empleador')" class="calc-card" id="btn-empleador">🏢 Costo Empleador</button>
                <button onclick="setCalc('grati')" class="calc-card" id="btn-grati">🎁 Gratificación</button>
                <button onclick="setCalc('cts')" class="calc-card" id="btn-cts">🛡️ CTS</button>
            </div>

            <div class="grid lg:grid-cols-5 gap-10">
                <div class="lg:col-span-3 bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-2xl border border-slate-200 dark:border-slate-800">
                    <div id="calc-ui">
                        </div>
                </div>
                <div class="lg:col-span-2">
                    <div id="calc-guide" class="p-8 bg-blue-600/5 dark:bg-blue-600/10 rounded-[2rem] border-2 border-dashed border-blue-500/20">
                        <h4 class="font-bold text-blue-600 mb-4 flex items-center gap-2">💡 Guía Rápida</h4>
                        <div id="guide-content" class="text-sm leading-relaxed opacity-80">
                            Selecciona una calculadora para ver su normativa y detalles técnicos.
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <h2 class="text-4xl font-black mb-8">Radar de <span class="text-blue-600">Oportunidades</span></h2>
            <input type="text" id="job-search" placeholder="Busca oficios (ej. Geólogo)..." class="w-full max-w-xl p-5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-xl focus:ring-2 ring-blue-500 outline-none transition-all">
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mt-10"></div>
        </section>

        <section id="sec-forex" class="sec-content">
            <h2 class="text-4xl font-black mb-8">Mercado <span class="text-blue-600">en Vivo</span></h2>
            <div class="grid lg:grid-cols-3 gap-8 mb-10" id="forex-grid"></div>
            <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-xl">
                <h4 class="font-bold mb-6 flex items-center gap-2">📊 Histórico Dólar (24h)</h4>
                <canvas id="forexChart" height="100"></canvas>
            </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
