<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | Enterprise Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col lg:flex-row transition-colors duration-300" id="app-body">
    
    <aside class="w-full lg:w-72 border-b lg:border-r border-slate-200 bg-white/90 backdrop-blur-xl p-6 sticky top-0 z-50 flex lg:flex-col shadow-sm dark:bg-slate-900 dark:border-slate-800">
        <div class="flex-1">
            <h1 class="text-2xl font-black mb-8 text-blue-600 tracking-tighter uppercase dark:text-blue-400">SueldoPro<span class="text-slate-400">2026</span></h1>
            <nav class="flex lg:flex-col gap-2 overflow-x-auto pb-4 lg:pb-0">
                <button onclick="nav('calcs')" id="m-calcs" class="sidebar-btn active">📊 <span>Calculadoras</span></button>
                <button onclick="nav('forex')" id="m-forex" class="sidebar-btn">💱 <span>Global Forex</span></button>
                <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn">🔎 <span>Radar Empleos</span></button>
                <button onclick="nav('news')" id="m-news" class="sidebar-btn">📰 <span>News Hub</span></button>
            </nav>
        </div>
        <div class="mt-auto pt-6 border-t border-slate-200 dark:border-slate-800 flex flex-col gap-4">
            <button onclick="toggleTheme()" class="theme-toggle-btn" id="theme-btn">🌙 Modo Oscuro</button>
            <span class="text-[10px] font-black opacity-20 dark:opacity-40 uppercase tracking-widest text-center">v5.0 Ultimate</span>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-12">
        <section id="sec-calcs" class="sec-content active">
            <h2 class="text-5xl font-black mb-10 tracking-tight dark:text-white">Financial <span class="text-blue-600">Hub</span></h2>
            <div class="flex flex-wrap gap-3 mb-10">
                <button onclick="setCalc('neto')" class="tab-btn t-neto active" id="btn-neto">Neto</button>
                <button onclick="setCalc('grati')" class="tab-btn t-grati" id="btn-grati">Gratificación</button>
                <button onclick="setCalc('cts')" class="tab-btn t-cts" id="btn-cts">CTS</button>
                <button onclick="setCalc('cuarta')" class="tab-btn t-cuarta" id="btn-cuarta">4ta Cat</button>
            </div>

            <div class="grid lg:grid-cols-12 gap-10">
                <div class="lg:col-span-7 bg-white dark:bg-slate-900 p-10 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800" id="calc-card">
                    <div id="calc-ui"></div>
                </div>
                <div class="lg:col-span-5 space-y-6">
                    <div id="res-card" class="bg-blue-600 text-white p-8 rounded-[2.5rem] shadow-xl transition-all">
                        <p class="text-[10px] font-bold opacity-70 uppercase mb-2">Resultado Estimado</p>
                        <div id="calc-res" class="text-4xl font-black">S/ 0.00</div>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] border border-slate-100 dark:border-slate-800">
                        <h4 class="font-black text-xs text-blue-600 dark:text-blue-400 mb-4 uppercase">Guía Detallada 2026</h4>
                        <div id="guide-text" class="text-sm leading-relaxed text-slate-600 dark:text-slate-300"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-forex" class="sec-content">
            <h2 class="text-4xl font-black mb-8 dark:text-white">Global <span class="text-blue-600">Forex</span></h2>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] shadow-xl lg:col-span-1">
                    <label class="label-pro">Monto (Soles)</label>
                    <input type="number" id="f-amt" oninput="updateForex()" class="input-pro mb-6" placeholder="0.00">
                    <div id="forex-list" class="space-y-2 h-[400px] overflow-y-auto pr-2 custom-scroll"></div>
                </div>
                <div class="lg:col-span-2 bg-white dark:bg-slate-900 p-8 rounded-[2.5rem] shadow-xl">
                    <h3 id="chart-title" class="text-xl font-black text-blue-600 mb-6 uppercase">Estadísticas</h3>
                    <canvas id="f-chart"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <h2 class="text-4xl font-black mb-8 dark:text-white">Radar <span class="text-blue-600">50 Empleos</span></h2>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-news" class="sec-content">
            <h2 class="text-4xl font-black mb-8 dark:text-white">Economy <span class="text-red-600 italic">News</span></h2>
            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
