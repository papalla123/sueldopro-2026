<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | The Global Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f7ff', 500: '#0066ff', 600: '#0052cc', 950: '#001a41' },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-50 text-surface-900 dark:bg-surface-950 dark:text-surface-50 transition-all duration-500">
    
    <aside class="fixed left-0 top-0 h-full w-20 lg:w-72 bg-white/80 dark:bg-surface-900/80 backdrop-blur-xl border-r border-slate-200 dark:border-surface-800 z-50 flex flex-col p-6">
        <div class="mb-12">
            <h1 class="hidden lg:block text-2xl font-black text-brand-500 tracking-tighter uppercase italic">SueldoPro<span class="text-slate-400">2026</span></h1>
            <div class="lg:hidden text-2xl font-black text-brand-500 italic">SP</div>
        </div>
        
        <nav class="flex-1 space-y-3">
            <button onclick="nav('calcs')" id="m-calcs" class="sidebar-btn active">📊 <span class="hidden lg:inline ml-4">Terminal Financiera</span></button>
            <button onclick="nav('forex')" id="m-forex" class="sidebar-btn">💱 <span class="hidden lg:inline ml-4">Mercado Forex</span></button>
            <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn">🔎 <span class="hidden lg:inline ml-4">Radar de Empleos</span></button>
            <button onclick="nav('news')" id="m-news" class="sidebar-btn">📰 <span class="hidden lg:inline ml-4">Economic News</span></button>
        </nav>

        <div class="pt-6 border-t border-slate-200 dark:border-surface-800">
            <button onclick="toggleTheme()" class="theme-btn">
                <span id="theme-icon">🌙</span> <span class="hidden lg:inline ml-2 uppercase text-[10px] font-black tracking-widest">Toggle Theme</span>
            </button>
        </div>
    </aside>

    <main class="ml-20 lg:ml-72 p-6 lg:p-12 min-h-screen">
        
        <section id="sec-calcs" class="sec-content active">
            <div class="max-w-6xl mx-auto">
                <header class="mb-12">
                    <h2 class="text-6xl font-black tracking-tighter mb-4">Financial <span class="text-brand-500">OS</span></h2>
                    <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                        <button onclick="setCalc('neto')" id="tab-neto" class="tab-pill active">Neto Mensual</button>
                        <button onclick="setCalc('grati')" id="tab-grati" class="tab-pill">Gratificaciones</button>
                        <button onclick="setCalc('cts')" id="tab-cts" class="tab-pill">CTS Semestral</button>
                        <button onclick="setCalc('cuarta')" id="tab-cuarta" class="tab-pill">4ta Categoría</button>
                    </div>
                </header>

                <div class="grid lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-7 bg-white dark:bg-surface-900 p-10 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-surface-800" id="calc-container">
                        <div id="calc-ui"></div>
                    </div>

                    <div class="lg:col-span-5 space-y-6">
                        <div id="res-card" class="bg-brand-500 p-10 rounded-[3rem] text-white shadow-2xl shadow-brand-500/30 transform transition-all duration-500">
                            <p class="text-xs font-black uppercase tracking-[0.2em] opacity-70 mb-2">Total Estimado</p>
                            <div id="calc-res" class="text-6xl font-black tracking-tighter tabular-nums">S/ 0.00</div>
                            <div id="calc-breakdown" class="mt-6 pt-6 border-t border-white/20 text-sm space-y-2 opacity-90"></div>
                        </div>
                        <div class="bg-slate-100 dark:bg-surface-800 p-8 rounded-[2.5rem] border-l-8 border-brand-500">
                            <h4 class="text-xs font-black text-brand-500 uppercase mb-4 tracking-widest">Compliance 2026 Manual</h4>
                            <div id="guide-text" class="text-sm leading-relaxed text-slate-600 dark:text-slate-300 space-y-3 italic"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-forex" class="sec-content">
            <h2 class="text-4xl font-black mb-10 tracking-tighter">Global <span class="text-brand-500">Currency Index</span></h2>
            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white dark:bg-surface-900 p-6 rounded-[2.5rem] border border-slate-200 dark:border-surface-800">
                    <input type="number" id="f-amt" oninput="updateForex()" class="w-full bg-slate-50 dark:bg-surface-800 p-6 rounded-3xl text-3xl font-black outline-none border-2 border-transparent focus:border-brand-500 transition-all mb-6 dark:text-white" placeholder="S/ 1,000">
                    <div id="forex-list" class="space-y-2 h-[500px] overflow-y-auto pr-2 custom-scroll"></div>
                </div>
                <div class="lg:col-span-8 bg-white dark:bg-surface-900 p-10 rounded-[3.5rem] border border-slate-200 dark:border-surface-800">
                    <div class="flex justify-between items-center mb-8">
                        <h3 id="chart-label" class="text-3xl font-black text-brand-500 uppercase">Trend Analysis</h3>
                        <div class="text-xs font-bold bg-green-100 text-green-600 px-4 py-2 rounded-full">REAL-TIME 2026</div>
                    </div>
                    <canvas id="f-chart" class="max-h-[500px]"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 gap-4">
                <h2 class="text-4xl font-black tracking-tighter">Radar <span class="text-brand-500 italic">100+ Opportunities</span></h2>
                <input type="text" id="job-search" oninput="renderJobs()" placeholder="Filtrar por puesto o tecnología..." class="p-4 rounded-2xl bg-white dark:bg-surface-900 border border-slate-200 dark:border-surface-800 outline-none focus:ring-2 ring-brand-500 w-full md:w-96">
            </div>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-news" class="sec-content">
            <h2 class="text-4xl font-black mb-10 tracking-tighter text-red-600">Market <span class="text-surface-900 dark:text-white">Intelligence Hub</span></h2>
            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
