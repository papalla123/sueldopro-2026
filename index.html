<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | Professional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#0066ff', 600: '#0052cc', 900: '#1e3a8a' },
                        dark: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-dark-950 dark:text-slate-100 transition-colors duration-300">
    
    <aside class="fixed left-0 top-0 h-full w-20 lg:w-72 bg-white dark:bg-dark-900 border-r border-slate-200 dark:border-slate-800 z-50 flex flex-col p-4">
        <div class="mb-10 px-4">
            <h1 class="hidden lg:block text-2xl font-black text-brand-500 uppercase italic tracking-tighter">SueldoPro<span class="text-slate-400">2026</span></h1>
            <div class="lg:hidden text-2xl font-black text-brand-500">SP</div>
        </div>
        
        <nav class="flex-1 space-y-2">
            <button onclick="nav('calcs')" id="m-calcs" class="sidebar-btn active">📊 <span class="hidden lg:inline ml-3">Calculadoras</span></button>
            <button onclick="nav('forex')" id="m-forex" class="sidebar-btn">💱 <span class="hidden lg:inline ml-3">Global Forex</span></button>
            <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn">🔎 <span class="hidden lg:inline ml-3">Radar Empleos</span></button>
            <button onclick="nav('news')" id="m-news" class="sidebar-btn">📰 <span class="hidden lg:inline ml-3">News Hub</span></button>
        </nav>

        <div class="pt-6 border-t border-slate-200 dark:border-slate-800">
            <button onclick="toggleTheme()" class="w-full flex items-center justify-center lg:justify-start gap-3 p-3 rounded-xl bg-slate-100 dark:bg-dark-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                <span id="theme-icon">🌙</span> <span class="hidden lg:inline font-bold text-xs uppercase tracking-widest">Cambiar Modo</span>
            </button>
        </div>
    </aside>

    <main class="ml-20 lg:ml-72 p-6 lg:p-12 min-h-screen">
        
        <section id="sec-calcs" class="sec-content active">
            <header class="mb-10 text-center lg:text-left">
                <h2 class="text-5xl font-black tracking-tight mb-2">Financial <span class="text-brand-500">Suite</span></h2>
                <p class="text-slate-500 dark:text-slate-400 font-medium italic">Calculamos tu futuro con precisión legal 2026.</p>
            </header>

            <div class="grid lg:grid-cols-12 gap-8 max-w-7xl mx-auto">
                <div class="lg:col-span-3 flex lg:flex-col gap-2 overflow-x-auto pb-4 lg:pb-0">
                    <button onclick="setCalc('neto')" id="tab-neto" class="tab-btn active">Sueldo Neto</button>
                    <button onclick="setCalc('grati')" id="tab-grati" class="tab-btn">Gratificación</button>
                    <button onclick="setCalc('cts')" id="tab-cts" class="tab-btn">CTS Semestral</button>
                    <button onclick="setCalc('cuarta')" id="tab-cuarta" class="tab-btn">4ta Categoría</button>
                </div>

                <div class="lg:col-span-5 bg-white dark:bg-dark-900 p-8 lg:p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 dark:border-slate-800">
                    <div id="calc-ui"></div>
                </div>

                <div class="lg:col-span-4 space-y-6">
                    <div id="res-box" class="bg-brand-500 text-white p-8 rounded-[2rem] shadow-xl shadow-brand-500/20 transform hover:scale-[1.02] transition-all">
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mb-1">Monto Líquido a Recibir</p>
                        <div id="calc-res" class="text-5xl font-black tracking-tighter">S/ 0.00</div>
                    </div>
                    <div class="bg-slate-100 dark:bg-dark-800 p-8 rounded-[2rem] border-l-4 border-brand-500">
                        <h4 class="text-xs font-black text-brand-500 uppercase tracking-widest mb-4">📚 Manual de Usuario</h4>
                        <div id="guide-text" class="text-sm leading-relaxed text-slate-600 dark:text-slate-300 space-y-3"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-forex" class="sec-content">
            <h2 class="text-4xl font-black mb-10">Global <span class="text-brand-500">Exchange</span></h2>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 bg-white dark:bg-dark-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800">
                    <label class="block text-xs font-black uppercase mb-4 opacity-50">Soles a cambiar (PEN)</label>
                    <input type="number" id="f-amt" oninput="updateForex()" class="w-full bg-slate-50 dark:bg-dark-800 p-5 rounded-2xl text-2xl font-black outline-none border-2 border-transparent focus:border-brand-500 transition-all mb-6" placeholder="0.00">
                    <div id="forex-list" class="space-y-2 h-[400px] overflow-y-auto pr-2 custom-scroll"></div>
                </div>
                <div class="lg:col-span-2 bg-white dark:bg-dark-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 min-h-[500px]">
                    <h3 id="chart-label" class="text-2xl font-black text-brand-500 mb-6 uppercase">Estadísticas Semanales</h3>
                    <canvas id="f-chart"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <h2 class="text-4xl font-black mb-10 tracking-tighter">Radar <span class="text-brand-500 italic">Opportunities</span></h2>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        </section>

        <section id="sec-news" class="sec-content">
            <h2 class="text-4xl font-black mb-10">Market <span class="text-red-500">Intelligence</span></h2>
            <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
