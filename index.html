<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | El Radar de Oficios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 flex flex-col lg:flex-row">
    <aside class="w-full lg:w-64 border-b lg:border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-4 sticky top-0 z-50">
        <h1 class="text-xl font-black mb-6 text-blue-600 hidden lg:block">SUELDOPRO 2026</h1>
        <nav class="flex lg:flex-col gap-2">
            <button onclick="nav('neto')" id="m-neto" class="sidebar-btn active flex-1 lg:flex-none flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">💰 <span>Sueldo Neto</span></button>
            <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn flex-1 lg:flex-none flex items-center gap-3 p-3 rounded-xl text-sm font-bold transition-all">🔍 <span>Radar 1000</span></button>
        </nav>
    </aside>

    <main class="flex-1 p-4 lg:p-10">
        <section id="sec-neto" class="sec-content active">
            <h2 class="text-4xl font-black mb-8 italic text-slate-800 dark:text-white">Calculadora <span class="text-blue-600">Neto 2026</span></h2>
            <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 max-w-lg">
                <label class="block text-xs font-bold mb-2 opacity-50 uppercase">Ingresa Sueldo Bruto (Mensual)</label>
                <input type="number" id="bruto" placeholder="Ej: 5000" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-slate-800 text-2xl font-black mb-4 outline-none border-2 border-transparent focus:border-blue-500 text-slate-800 dark:text-white">
                <button onclick="calcularSueldoNeto()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-blue-500/30">CALCULAR AHORA</button>
                <div id="resultado-calculo"></div>
            </div>
            <div class="mt-10 p-6 bg-blue-50/50 dark:bg-blue-900/10 border-l-4 border-blue-600 rounded-r-2xl max-w-lg">
                <h4 class="font-black text-blue-600 uppercase mb-2">Base Legal 2026</h4>
                <p class="text-sm italic opacity-80 text-slate-600 dark:text-slate-300">Cálculos proyectados con la UIT de S/ 5,500. Se aplican descuentos de AFP (11.84%) y escalas de Impuesto a la Renta de 5ta categoría.</p>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <h2 class="text-4xl font-black mb-8 italic text-slate-800 dark:text-white">Radar <span class="text-blue-600">1000</span></h2>
            <div class="max-w-xl mb-8">
                <input type="text" id="job-search" placeholder="Busca un oficio o profesión..." class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm outline-none focus:border-blue-500 text-slate-800 dark:text-white">
            </div>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
