<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SueldoPro Ultra</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>SueldoPro Ultra 2026</h1>

<div>
    <input id="sueldo" type="number" placeholder="Sueldo">
    <input id="af" type="number" placeholder="Asignación Familiar">
    <button onclick="run()">Calcular Neto</button>
</div>

<div id="main-result"></div>
<div id="details-container"></div>
<p id="legal-info"></p>

<script type="module">
import { runCalc } from './script.js';

window.run = () => {
    runCalc("sueldoNeto", {
        sueldo: +document.getElementById('sueldo').value,
        asignacionFamiliar: +document.getElementById('af').value,
        sistema: "AFP",
        afp: "habitat"
    });
};
</script>

</body>
</html>
