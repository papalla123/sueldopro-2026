<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | Enterprise Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col lg:flex-row transition-colors duration-500">
    
    <aside class="w-full lg:w-72 border-b lg:border-r border-slate-200 bg-white/80 backdrop-blur-xl p-6 sticky top-0 z-50 flex lg:flex-col shadow-sm">
        <div class="flex-1">
            <h1 class="text-2xl font-black mb-8 text-blue-600 tracking-tighter uppercase">SueldoPro<span class="text-slate-400">2026</span></h1>
            <nav class="flex lg:flex-col gap-2 overflow-x-auto pb-4 lg:pb-0">
                <button onclick="nav('calcs')" id="m-calcs" class="sidebar-btn active">📊 <span>Calculadoras</span></button>
                <button onclick="nav('forex')" id="m-forex" class="sidebar-btn">💱 <span>Conversor Pro</span></button>
                <button onclick="nav('jobs')" id="m-jobs" class="sidebar-btn">🔎 <span>Radar Oficios</span></button>
            </nav>
        </div>
        <div class="flex items-center justify-between mt-auto pt-6 border-t border-slate-200">
            <button onclick="toggleTheme()" class="theme-toggle-btn" id="theme-btn">🌙 Modo Noche</button>
            <span class="text-[10px] font-black opacity-30 uppercase">v3.5 Stable</span>
        </div>
    </aside>

    <main class="flex-1 p-4 lg:p-12">
        <section id="sec-calcs" class="sec-content active">
            <h2 class="text-5xl font-black mb-10 tracking-tight">Financial <span class="text-blue-600">Hub</span></h2>
            <div class="flex flex-wrap gap-3 mb-10">
                <button onclick="setCalc('neto')" class="calc-tab active" id="btn-neto">Sueldo Neto</button>
                <button onclick="setCalc('costo')" class="calc-tab" id="btn-costo">Costo Empresa</button>
                <button onclick="setCalc('cuarta')" class="calc-tab" id="btn-cuarta">4ta Categoría</button>
                <button onclick="setCalc('vacaciones')" class="calc-tab" id="btn-vacaciones">Vacaciones</button>
                <button onclick="setCalc('grati')" class="calc-tab" id="btn-grati">Gratificación</button>
            </div>

            <div class="grid lg:grid-cols-5 gap-10">
                <div class="lg:col-span-3 bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-2xl transition-all" id="calc-container">
                    <div id="calc-ui"></div>
                </div>
                <div class="lg:col-span-2">
                    <div class="p-8 bg-blue-600/5 rounded-[2.5rem] border-2 border-dashed border-blue-500/20" id="guide-box">
                        <h4 class="font-bold text-blue-600 mb-4 flex items-center gap-2">📑 Guía Profesional</h4>
                        <div id="guide-text" class="text-sm leading-relaxed opacity-80 space-y-4"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-forex" class="sec-content">
            <h2 class="text-4xl font-black mb-8 italic">Global <span class="text-blue-600">Forex Hub</span></h2>
            <div class="grid lg:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200" id="forex-card">
                    <div class="space-y-6">
                        <div>
                            <label class="label-text">Monto en Soles (PEN)</label>
                            <input type="number" id="forex-amount" oninput="convertCurrency()" placeholder="0.00" class="main-input">
                        </div>
                        <div>
                            <label class="label-text">Convertir a:</label>
                            <select id="forex-select" onchange="updateForexUI()" class="main-input text-lg"></select>
                        </div>
                        <div class="p-8 bg-blue-600 rounded-[2rem] text-white shadow-lg shadow-blue-500/40">
                            <p class="text-xs font-bold opacity-70 uppercase tracking-widest">Cambio Estimado</p>
                            <h3 id="forex-result" class="text-5xl font-black mt-2">0.00</h3>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-200" id="chart-card">
                    <canvas id="forexChart"></canvas>
                </div>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <h2 class="text-4xl font-black mb-8">Radar <span class="text-blue-600">Mintra 2026</span></h2>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
