<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SueldoPro 2026 | Global Market Supremacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 dark:bg-dark-950 flex">
    <main class="flex-1 ml-20 lg:ml-64 p-6 lg:p-10">
        <section id="sec-neto" class="sec-content active">
            <div class="guide-box p-6 mt-6 rounded-2xl">
                <h4 id="guide-neto-title" class="font-black text-brand-500 uppercase"></h4>
                <p id="guide-neto-text" class="text-sm italic opacity-80"></p>
            </div>
        </section>

        <section id="sec-jobs" class="sec-content">
            <div class="flex flex-col md:flex-row justify-between mb-8 gap-4">
                <h2 class="text-4xl font-black italic">Radar <span class="text-brand-500">2026</span></h2>
                <input type="text" id="job-search" placeholder="Busca entre 1,000 profesiones..." 
                       class="p-4 rounded-xl bg-white dark:bg-dark-900 border border-slate-200 dark:border-slate-800 outline-none w-full md:w-80">
            </div>
            <div id="job-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </section>

        <section id="sec-forex" class="sec-content">
            <h2 class="text-4xl font-black mb-8 italic">Mercado <span class="text-brand-500">Forex Live</span></h2>
            <div class="grid lg:grid-cols-3 gap-8">
                <div class="bg-white dark:bg-dark-900 p-6 rounded-3xl shadow-xl">
                    <select id="currency-select" class="w-full p-4 rounded-xl bg-slate-100 dark:bg-dark-800 font-bold mb-4"></select>
                    <div id="currency-result" class="text-3xl font-black text-brand-500 text-center py-6 border-t border-b my-4">S/ 0.00</div>
                </div>
                <div class="lg:col-span-2 bg-white dark:bg-dark-900 p-6 rounded-3xl shadow-xl min-h-[400px]">
                    <canvas id="forexChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
