        function updateAllGuides() {
            const lang = currentLang;
            
            // Mapeo manual de las guías para asegurar que ninguna se escape

                { id: 'guide-v', prefix: 'guide_v' }
            ];

            guides.forEach(g => {
                const titleEl = document.querySelector(`#sec-${g.id.split('-')[1]} h4`);
                const textEl = document.getElementById(`${g.id}-text`);
                
                if (titleEl) titleEl.innerText = i18n[lang][`${g.prefix}_title`];
                if (textEl) textEl.innerText = i18n[lang][`${g.prefix}_text`];
            });

        // Modificar la función setLang original para incluir updateAllGuides()
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-t]').forEach(el => {
                const key = el.getAttribute('data-t');
                if(i18n[lang][key]) el.innerText = i18n[lang][key];
            });
            
            updateAllGuides(); // <--- Llamada crucial
